<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techwave</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/fontawesome.min.js">
  
</head>
<body>
   <header>
     <nav class="navbar">
       <img class="logo-img" src="./assets/TechWave.png" alt="Logo">
       <!-- Hidden Checkbox -->
        <input type="checkbox" name="" id="menu-check" class="menu-check">
        <!-- Hamburger Icon -->
         <label for="menu-check" class="menu-toggle open-icon">☰</label>
         <label for="menu-check" class="menu-toggle close-icon">✕</label>


       <ul class="nav-links">
         <li class="nav-item"><a href="" class="nav-link">About</a></li>
         <li class="nav-item"><a href="" class="nav-link">Episodes</a></li>
         <li class="nav-item"><a href="" class="nav-link">Host</a></li>
         </ul>
       <a href="" class="btn-link btn-primary nav-btn">Subscribe →</a>
    </nav>

    <!-- Hero Section -->
    <section class="banner">
        <div class="podcast-grp">
            <img class="podcast-circle" src="./assets/hero-circle.png" alt="">
            <img class="microphone" src="./assets/microphone.png" alt="">
            <button class="badge-btn">NEW</button>

        </div>

        <div class="podcast-content">
            <h1 class="m-t">TechWave</h1>
            <p class="m-p">Your daily dose of tech insights, productivity hacks, and personal growth</p>

        </div>

        <div class="podcast-btn">
            <a href="#" class="btn-primary">Listen On Spotify</a>
        <a href="#" class="btn-secondary">Subscribe</a>

        </div>
    </section>
   </header>

   <!-- About Section -->
</body>
</html>
